<html>
	<head>
		<script>if(navigator.userAgent.includes("CrOS"))document.addEventListener("keydown",(event)=>{if(event.keyCode==119)window.addEventListener("beforeunload",(event) => {event.preventDefault();});},{passive:true,once:true});</script>
		<link rel="stylesheet" href="style.css">
		<link rel="icon" href="../Icons/PageFavicon.ico">
	</head>
	<body>
		<main style="display: flex; flex-direction: column;">
			<video id="video" style="width: 100%; height: 100%; background-color: black;" inert></video>
			<div style="position: absolute; width: 100%; background-color: rgba(255,255,255,.5);">
				<input type="file" id="upload">
				<span class="buttonChunk"><button id="skipBackward">Frame Skip Backward</button><button id="skipForward">Frame Skip Forward</button></span>
				<label class="buttonChunk" title="Skip Duration (time to next frame / 5). Setting this too high may unintentionally skip frames when seeking forward.">Skip Duration: <input type="number" id="skipDuration" value="0.001" step="0.0001" min="0.0001"></label>
				<label class="buttonChunk" title="The time of the video's current frame (secs)">MediaTime: <input id="mediaTimeInput" type="number" value="0" step="0.0001"></label>
				<div>
					<span class="buttonChunk">
						<label>Frame Rate: <input type="number" id="videoFrameRate" value="" step="0.0001" min="0.0001"></label>
						<button id="calcFramerate">Calc Framerate</button>
					</span>
					<span class="buttonChunk">
						<button id="calcFrameNumber">Calc Frame Number</button>
						<output id="outputFrame" name="currentFrame" for="videoFrameRate calcCurrentVideoFrame"></output>
					</span>
				</div>
			</div>
			<div style="position: absolute; top: 100%; transform: translateY(-100%); background-color: rgba(0,0,0,.7); display: flex; flex-direction: row; width:100%; height:40px;">
				<div id="modifiers" style="display: flex; justify-content: flex-start;">
					<div style="position: relative; height:100%; aspect-ratio:1;" title="Mute (M)" class="tableBorder">
						<input style="display: none;" class="muteCheckbox" type="checkbox" id="0Mute">
						<div>
							<!-- <img  src="../Icons/SpeakerIcon.svg" alt="Volume Changer & Mute Button"/> -->
							<svg style="width:100%; height:100%; position: absolute; left:50%; transform: translate(-50%, 0%); fill: white; stroke: white;" xmlns="http://www.w3.org/2000/svg" version="1.0" width="500" height="500" viewBox="0 0 75 75"><path d="M39.389,13.769 L22.235,28.606 L6,28.606 L6,47.699 L21.989,47.699 L39.389,62.75 L39.389,13.769z" style="stroke-width:5;stroke-linejoin:round;"/><path d="M48,27.6a19.5,19.5 0 0 1 0,21.4M55.1,20.5a30,30 0 0 1 0,35.6M61.6,14a38.8,38.8 0 0 1 0,48.6" style="fill: none;stroke-width:5;stroke-linecap:round"/></svg>
							<div tabindex="0" id="volumePullsOpen" class="pullsOpen" style="visibility: visible; position: absolute;">
								<div>
									<label for="0playVolume" style="color: black; position: absolute;">100%</label>
									<input type="range" id="0playVolume" max=100 min=0 value=1 step=0.01 style="writing-mode: vertical-lr; direction: rtl; width: 100%; height: 100%; position: relative;" />
								</div>
							</div>
						</div>
					</div>
				</div>
				<div id="controls" style="justify-content: center; height: 100%; flex-grow: 1;">
					<div style="display: flex; margin: auto; height: 100%; max-width: 1000px; flex-grow: 1;">
						<div id="skipBack" tabindex="0" class="cell clickableButton tableBorder" title="Skip Back (Shift + P)" style="width: 100%; text-align: center;">
							<img class="playBackIcon" width="30" height="30" style="width:50%; height:100%; object-fit: contain;filter: invert(1);" src="../Icons/SkipIcon.svg" alt="Previous Song"/>
						</div>
						<div id="seekBack" tabindex="0" class="cell clickableButton tableBorder" title="Seek Back (LeftArrow)" style="width: 100%; max-width: 200px;">
							<img class="playBackIcon" width="60" height="30" style="width:100%; height:100%; filter: invert(1);" src="../Icons/SeekIcon.svg" alt="Seek Backwards"/>
						</div>
						<div tabindex="0" class="cell clickableButton tableBorder" title="Play/Pause (Space | K)" style="width: 100%; max-width: 200px;">
							<div id="playButton" style="filter: invert(1);"></div>
						</div>
						<div id="seekForward" tabindex="0" class="cell clickableButton tableBorder" title="Seek Forward (RightArrow)" style="width: 100%; max-width: 200px;">
							<img class="playBackIcon" width="60" height="30" style="width:100%; height:100%; transform: scaleX(-1); filter: invert(1);" src="../Icons/SeekIcon.svg" alt="Seek Forwards"/>
						</div>
						<div id="skipForward" tabindex="0" class="cell clickableButton tableBorder" title="Skip Forward (Shift + P)" style="width: 100%; max-width: 200px; text-align: center;">
							<img class="playBackIcon" width="30" height="30" style="width:50%; height:100%; transform: scaleX(-1); filter: invert(1); object-fit: contain;" src="../Icons/SkipIcon.svg" alt="Next Song"/>
						</div>
					</div>
				</div>
				<div id="modifiers1" style="display: flex; justify-content: flex-end;">
					<div id="fullscreenButton" tabindex="0" class="cell clickableButton tableBorder" title="Skip Back (Shift + P)" style="height:100%;">
						<img style="height: 100%; pointer-events: none; filter: invert(1);" src="../Icons/CancelIcon.svg" alt="Fullscreen"/>
					</div>

				</div>
			</div>
		</main>
		<script>
			var PREFERRED_ITERS = 5;

			const fileUpload = document.getElementById("upload");
			const skipForwardButton = document.getElementById("skipForward");
			const skipBackwardButton = document.getElementById("skipBackward");
			const skipDuration = document.getElementById("skipDuration");
			/** @type HTMLInputElement */
			const inputMediaTime = document.getElementById("mediaTimeInput");
			/** @type HTMLInputElement */
			const inputFrameRate = document.getElementById("videoFrameRate");
			const calcFramerateButton = document.getElementById("calcFramerate");
			const calcFrameNumberButton = document.getElementById("calcFrameNumber");
			/** @type HTMLOutputElement */
			const outputFrame = document.getElementById("outputFrame");
			let videoURL = null;
			/** @type HTMLVideoElement */
			const video = document.getElementById("video");
			var seeking = 0;
			var iters = 0;
			var currentMediaTime = 0;
			var frameRate = NaN;
			/** @type null | (framerate: number) => null */
			let resolveWithVideoFrameRate = null;

			setButtonsDisabled(true);

			let videoFrameArray = null;

			async function uploadFile(file){
				if(video.src)
					URL.revokeObjectURL(video.src);
				else
					setButtonsDisabled(false);

				videoURL = URL.createObjectURL(file);
				const videoLength = await new Promise((resolve, reject) => {
					/** @type HTMLVideoElement */
					const testVideoElement = document.createElement("video");
					testVideoElement.addEventListener("durationchange", (event) => {
						resolve(testVideoElement.duration);
					})
					testVideoElement.preload = "metadata";
					testVideoElement.src = videoURL;
				});

				const promises = [];
				const numSeconds = Math.ceil(videoLength);
				videoFrameArray = new Array(numSeconds);
				for(let i = 1; i <= numSeconds; i++){ //1 to including numSeconds
					promises.push(createTimestampsForSecond(i));
				}
				await Promise.all(promises);

				video.src = videoURL;
				// video.play();
			}
			function createTimestampsForSecond(second){
				return new Promise((resolve, reject) => {
					const videoFrameTimestamps = videoFrameArray[second] = [];

					/** @type HTMLVideoElement */
					const videoElement = document.createElement("video");
					let pastMediaTime = null;
					function firstVideoFrame(now, metadata){
						videoElement.requestVideoFrameCallback(onVideoFrame);
						videoElement.currentTime = second;
					}
					/** @param now number
					 * @param metadata VideoFrameCallbackMetadata */
					function onVideoFrame(now, metadata){
						if((Math.ceil(metadata.mediaTime) < second && metadata.mediaTime !== 0) || metadata.mediaTime === pastMediaTime){
							videoFrameArray[second] = videoFrameTimestamps.toReversed();
							resolve();
						} else {
							videoElement.requestVideoFrameCallback(onVideoFrame);
							pastMediaTime = metadata.mediaTime;
							videoFrameTimestamps.push(metadata.mediaTime);
							videoElement.currentTime = metadata.mediaTime-0.0001;
						}
					}

					videoElement.requestVideoFrameCallback(firstVideoFrame);
					videoElement.preload = "auto";
					videoElement.src = videoURL;
				});
			}

			fileUpload.addEventListener("change", () => {
				uploadFile(fileUpload.files[0]);
			}, true);
			document.addEventListener("dragover", (event) => {
				const dataTransfer = event.dataTransfer;
				if(dataTransfer.types.includes("Files"))
					event.preventDefault();
			});
			document.addEventListener("drop", (event) => {
				const dataTransfer = event.dataTransfer;
				if(dataTransfer.types.includes("Files")){
					event.preventDefault();
					uploadFile(dataTransfer.files[0]);
				}
			});

			function videoFrameAdvanced(now, metadata){
				console.log(`iters: ${iters}; currentTime: ${video.currentTime}; prevMediaTime: ${currentMediaTime}; mediaTime: ${metadata.mediaTime}`);
				skipDuration.valueAsNumber = (skipDuration.valueAsNumber*iters)/PREFERRED_ITERS;
				if(iters >= PREFERRED_ITERS){
					if(resolveWithVideoFrameRate != null){
						resolveWithVideoFrameRate(1/(metadata.mediaTime-currentMediaTime));
					}
					currentMediaTime = metadata.mediaTime;
					inputMediaTime.valueAsNumber = metadata.mediaTime;
					setButtonsDisabled(false);
					seeking = 0;
					iters = 0;
				} else {
					console.log(`Not enough iterations. Restarting to ${currentMediaTime}`);
					video.currentTime = currentMediaTime;
					iters = 0;
				}
			}

			function onVideoFrame(now, metadata){
				video.requestVideoFrameCallback(onVideoFrame);
				// noinspection FallThroughInSwitchStatementJS
				switch(seeking){
					case -1:
						if(resolveWithVideoFrameRate != null){
							resolveWithVideoFrameRate(1/(currentMediaTime-metadata.mediaTime));
						}
						seeking = 0;
					case 0:
						currentMediaTime = metadata.mediaTime;
						inputMediaTime.valueAsNumber = currentMediaTime;
						break;
					case 1:
						if(currentMediaTime < metadata.mediaTime){
							videoFrameAdvanced(now, metadata);
						} else {
							video.currentTime += skipDuration.valueAsNumber;
							console.log(video.currentTime);
							iters++;
						}
						break;
				}
			}
			video.requestVideoFrameCallback(onVideoFrame);

			function skipBackward(){
				seeking = -1;
				video.currentTime = currentMediaTime-0.0001;
			}
			function skipForward(){
				seeking = 1;
				//change video time to be super slightly above mediaTime (to reduce precision errors) and ensure it is different from the currentTime so the video is forced to seek
				if(video.currentTime === currentMediaTime+0.0001)
					video.currentTime = currentMediaTime+0.0002;
				else
					video.currentTime = currentMediaTime+0.0001;
			}
			function calcFrameNumberAndDisplay(){
				if(!frameRate){
					inputFrameRate.focus();
					return;
				}
				const frameNumber = currentMediaTime*frameRate;
				console.log("RAW: " + String(frameNumber))
				outputFrame.innerText = String(Math.round(frameNumber));
			}
			function setButtonsDisabled(disabled){
				skipForwardButton.disabled = disabled;
				skipBackwardButton.disabled = disabled;
				calcFramerateButton.disabled = disabled;
				video.inert = disabled;
			}


			skipBackwardButton.addEventListener("click", () => {
				setButtonsDisabled(true);
				video.pause();
				video.addEventListener("seeked", () => {
					setButtonsDisabled(false);
				}, {once: true});
				skipBackward();
			}, true);

			skipForwardButton.addEventListener("click", () => {
				if(video.ended) return;
				video.pause();
				setButtonsDisabled(true);
				skipForward();
			}, true);

			calcFramerateButton.addEventListener("click", async () => {
				if(currentMediaTime <= 0.0001 || video.ended) return;
				setButtonsDisabled(true);
				video.pause();
				const backwardFramerate = await new Promise(resolve => {
					resolveWithVideoFrameRate = resolve;
					skipBackward();
				});
				console.log("Frame rate backward: " + String(backwardFramerate));
				await new Promise(resolve => setTimeout(resolve, 0)); //allow normal processes to finish before starting next thingy
				const forwardFramerate = await new Promise(resolve => {
					resolveWithVideoFrameRate = resolve;
					skipForward();
				});
				console.log("Frame rate forward: " + String(forwardFramerate));

				// frameRate = ((backwardFramerate+forwardFramerate)/2);
				frameRate = (backwardFramerate+forwardFramerate)/2;
				console.log("Framerate raw: " + String(frameRate));
				frameRate = Math.round(frameRate*100)/100;
				console.log("Framerate fixed: " + String(frameRate));
				inputFrameRate.value = frameRate;//.toFixed(2);
			}, true);

			inputFrameRate.addEventListener("change", () => {
				frameRate = inputFrameRate.valueAsNumber;
			})

			calcFrameNumberButton.addEventListener("click", () => {
				calcFrameNumberAndDisplay();
			}, true);

			inputMediaTime.addEventListener("change", () => {
				video.currentTime = inputMediaTime.valueAsNumber;
			}, true);
		</script>
	</body>
</html>
