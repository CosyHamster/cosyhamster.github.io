<html lang="en">
	<head>
		<script>if(navigator.userAgent.includes("CrOS"))document.addEventListener("keydown",(event)=>{if(event.keyCode==119)window.addEventListener("beforeunload",(event) => {event.preventDefault();});},{passive:true,once:true});</script>
		<link rel="stylesheet" href="style.css">
		<script type="importmap">{"imports": {"mediabunny": "../Javascript/mediabunny.min.mjs", "mp4box": "../Javascript/mp4box.all.js"}}</script>
		<script type="module" src="script.js" defer></script>
		<link rel="icon" href="../Icons/PageFavicon.ico">
		<title>Frame Skipper</title>
	</head>
	<body style="--interactivity:inert; --interactivityPointerEvents:none; --abLoopDisplay:none; --frameViewDisplay:none;">
		<main>
			<div id="loadingFR"><div>Determining Frame Rate<progress id="loadingPercentage" max="1" value="0" style="width: 50%; display: block; margin: 0 auto 0 auto;"></progress></div></div>
			<video id="video" style="width: 100%; height: 100%; background-color: black;"></video>
			<div style="position: fixed; top: 0; left: 0; width: max-content; padding-left:1ch; padding-right:1ch; text-align: center; pointer-events: none; transform: translate(-9999px, 0px); z-index: 3; background-color: lightgrey; color: black;" id="hoveredTimeDisplay">
				<div class="prevent-select text" style="display: block;"></div>
				<div class="prevent-select text" style="display: block;"></div>
			</div>
			<div id="ui" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
				<div id="videoControlsT" style="position: absolute; top:0; left:0; width:100%; background-color: rgba(0,0,0,.7); pointer-events: auto;">
					<div style="display: flex; flex-direction: row; width:100%; height: max(4.5vh, 40px);">
						<label tabindex="0" class="cell clickableButton tableBorder" title="Upload File" style="height:100%;">
							<input type="file" accept="video/*" id="upload" style="display: none;">
							<img class="invertColor" style="width: 100%; height: 100%; pointer-events: none;" src="../Icons/UploadIcon.svg" alt="Upload"/>
						</label>
						<div class="tableBorder text" id="inputColorContainer" style="height:100%; color: white; font-size: min(5cqw, 18px); --color: #ffffff;">
							Frame:
							<span id="frameNumber" tabindex="0" contenteditable="plaintext-only" inputmode="numeric" enterkeyhint="send" style="color: var(--color);">N/A</span>
							<div title="The time of the video's current frame (secs)" id="mediaTimeInput" tabindex="0" contenteditable="plaintext-only" inputmode="numeric" enterkeyhint="send" style="color: var(--color); width: 10em;">N/A</div>
						</div>
						<div class="spacer scrollableText" style="color: white; margin: 0 1em; white-space: normal;" id="videoTitle"></div>
						<a tabindex="0" class="cell clickableButton tableBorder" title="Download Frame" style="height:100%;" id="downloadFrame" download>
							<img class="invertColor" style="width: 100%; height: 100%; pointer-events: none;" src="../Icons/DownloadFile.svg" alt="Download"/>
						</a>
						<div>
							<div style="height:100%;">
								<button tabindex="0" class="clickableButton moreMenuButton" title="More" id="moreMenuButton" popovertarget="moreMenuDropdown">
									<img class="invertColor" style="width: 100%; height: 100%; pointer-events: none;" src="../Icons/MoreMenuIcon.svg" alt="More"/>
								</button>
								<div id="moreMenuDropdown" anchor="moreMenuButton" popover="auto">
									<div class="" tabindex="1"><label>Frame Rate: <input type="number" id="videoFrameRate" tabindex="1" value="" step="any" min="0.0001"></label></div>
									<div id="toggleLoopBar" class="clickableButton" tabindex="1">Toggle AB Looping</div>
									<div id="setAHere" class="clickableButton" tabindex="1" style="display: var(--abLoopDisplay);">Set A Here</div>
									<div id="setBHere" class="clickableButton" tabindex="1" style="display: var(--abLoopDisplay);">Set B Here</div>
									<div id="trimVideo" class="clickableButton" tabindex="1" style="display: none;/*var(--abLoopDisplay);*/">Save Copy From A to B (inclusive)</div>
<!--									doesn't work because mediabunny still doesn't support negative timestamps-->
									<div tabindex="1">Using <a tabindex="1" href="https://github.com/gpac/mp4box.js/" target="_blank">MP4Box</a> and <a tabindex="1" href="https://github.com/Vanilagy/mediabunny/" target="_blank">Mediabunny</a></div>
								</div>
							</div>
						</div>
					</div>
<!--					<div style="background-color: rgba(255,255,255,.5); width:100%; opacity: .5;">-->
<!--						<label class="buttonChunk" title="The time of the video's current frame (secs)">MediaTime: <input id="mediaTimeInput" type="number" value="0" step="0.0001"></label>-->
<!--						<label class="buttonChunk">Frame Rate: <input type="number" id="videoFrameRate" value="" step="any" min="0.0001"></label>-->
<!--					</div>-->
				</div>
				<div id="videoControlsB" style="position: absolute; top: 100%; left:0; transform: translateY(-100%); background-color: rgba(0,0,0,.7); width:100%; pointer-events: auto;">
					<div class="playbarContainer">
						<div style="display: flex; flex-direction: row; align-items: baseline; width: 100%; height: 20px;">
							<div id="firstDurationLabel" style="margin-right: 1ch; color: white;" class="text" contenteditable="plaintext-only" enterkeyhint="send">00:00</div>
							<div style="flex: 1 1; container-type: inline-size; anchor-name: --bar;"><div class="playbar interactivity"></div></div>
							<div id="secondDurationLabel" style="margin-left: 1ch; color: white;" class="text">00:00</div>
						</div>
						<div id="loopBarTrack" class="interactivity" style="position: absolute; top: -20px; left: anchor(--bar left); margin-left: 4px; width: calc(anchor-size(--bar width) - 8px); height: 20px; display: var(--abLoopDisplay);"> <!--style="position: absolute; grid-area: 1 / 1 / 2 / 2; position-anchor: --bar; height: 20px; left: calc(anchor(left) + 4px); width: calc(anchor-size(width) - 8px); top: 0px; transform: translateY(-100%); display: var(--abLoopDisplay);"-->
							<div id="drag1" tabindex="0" style="position: absolute; height: 100%; width: 8px; background-color: gold; --progress: 0%; left: var(--progress); transform: translateX(-50%); z-index: 2; anchor-name: --drag1;"></div>
							<div id="drag2" tabindex="0" style="position: absolute; height: 100%; width: 8px; background-color: gold; --progress: 100%; left: var(--progress); transform: translateX(-50%); z-index: 2; anchor-name: --drag2;"></div>
							<div id="yellowBar" style="position: absolute; left: anchor(--drag1 left); right: anchor(--drag2 left); top: 50%; transform: translateY(-50%); height: 5px; background-color: gold; z-index: 1;"></div>
						</div>
						<div style="display: var(--abLoopDisplay);"><div style="height: 20px;"></div></div>
<!--						<div id="frameView" class="interactivity" style="width: 100%; display: var(&#45;&#45;frameViewDisplay);"> &lt;!&ndash;style="position: absolute; grid-area: 1 / 1 / 2 / 2; position-anchor: &#45;&#45;bar; height: 20px; left: calc(anchor(left) + 4px); width: calc(anchor-size(width) - 8px); top: 0px; transform: translateY(-100%); display: var(&#45;&#45;abLoopDisplay);"&ndash;&gt;-->
<!--							<div id="frameViewContainer">-->
<!--								<div style="width: 10000000px; height: 100%; container-type: size; display: flex; flex-direction: row; flex-wrap: nowrap;">-->
<!--									<div class="frameItem clickableButton">-->
<!--										<img src="../Icons/videoframe_118688.png" alt="frame 123" style="/*flex: 1 1; */min-height: 0; object-fit: contain;">-->
<!--										<div style="flex-shrink: 0;"><div>Frame</div><div>123534</div></div>-->
<!--									</div>-->
<!--								</div>-->

<!--							</div>-->
<!--						</div>-->
						<div id="frameView" class="interactivity" style="display: var(--frameViewDisplay); --scrollWidth: 0px;">
							<div style="width: var(--scrollWidth);" class="frameItemContainer"><div id="frameItemOffset" style="width: 100px;"></div><div id="frameItemContainer" class="frameItemContainer"></div></div>
						</div>
						<div class="interactivity" style="position: relative; width: 100%; height: 20px; display: flex; flex-direction: row; flex-wrap: nowrap;"> <!--style="position: absolute; grid-area: 1 / 1 / 2 / 2; position-anchor: --bar; height: 20px; left: calc(anchor(left) + 4px); width: calc(anchor-size(width) - 8px); top: 0px; transform: translateY(-100%); display: var(--abLoopDisplay);"-->
							<div style="position: absolute; color: white; display: var(--frameViewDisplay);"><label><input type="checkbox" id="keyframesOnlyCheckbox">Keyframes Only</label></div>
							<div style="width: 20px; height: 20px; margin-left: auto; margin-right: auto;">
								<div role="button" tabindex="0" class="clickableButton" style="width: 20px;height: 20px;margin-left: auto;margin-right: auto;" title="Show Frames" id="frameViewToggle">
									<div class="invertColor" style="width: 20px;height: 20px;"></div>
								</div>
							</div>
						</div>

					</div>
					<div style="display: flex; flex-direction: row; width:100%; height: max(4.5vh, 40px); container-type: size;">
						<div title="Mute (M)" class="cell tableBorder" style="height:100%; max-width: 100cqh;">
							<img src="../Icons/SpeakerIcon.svg" id="volumeIcon" style="width: 100%; height: 100%; pointer-events: none;" class="">
							<div tabindex="0" class="pullsOpen">
								<div>
									<input type="range" id="volumeSlider" max=1 min=0 value=1 step=0.0001 style="writing-mode: vertical-lr; direction: rtl; width: 100%; height: 100%; position: relative;">
								</div>
							</div>
						</div>
						<div title="Playback Rate" class="cell tableBorder" style="height:100%; max-width: 100cqh;">
							<img src="../Icons/PlaybackSpeedIcon.svg" id="playRateIcon" style="width: 100%; height: 100%; pointer-events: none;" class="">
							<div tabindex="0" class="pullsOpen">
								<div style="display: flex; flex-direction: column;">
									<datalist style="display: none" id="playBackRates"><option value="0.0625"></option><option value="0.25"></option><option value="0.5"></option><option value="0.75"></option><option value="1"></option><option value="1.25"></option><option value="1.5"></option><option value="1.75"></option><option value="2"></option><option value="2.25"></option><option value="2.5"></option><option value="2.75"></option><option value="3"></option><option value="3.25"></option><option value="3.5"></option><option value="3.75"></option><option value="4"></option></datalist>
									<input type="number" style="width: 100%" class="playRate" id="playRateInput" value="1" step="any" max="4" min="0.0625" inputmode="numeric">
									<input type="range" id="playRateSlider" list="playBackRates" max="4" min="0" value="1" step="0.01" style="writing-mode: vertical-lr; direction: rtl; width: 100%; height: 100%; position: relative; flex-grow: 1;">
								</div>
							</div>
						</div>
						<div class="spacer"></div>
						<div id="controls" class="interactivity" style="justify-content: center; flex-grow: 1; height: 100%;">
							<div style="display: flex; margin: auto; height: 100%; max-width: 1000px; flex-grow: 1;">
								<div id="seekBackward" tabindex="0" class="cell clickableButton tableBorder" title="Skip Back (LeftArrow)" style="width: 100%; text-align: center;">
									<img class="playBackIcon invertColor" width="30" height="30" style="width:50%; height:100%; object-fit: contain;" src="../Icons/FastForwardIcon.svg" alt="Previous Song"/>
								</div>
								<div id="skipBackward" tabindex="0" class="cell clickableButton tableBorder" title="Frame Skip Back (Shift + LeftArrow)" style="width: 100%;">
									<img class="playBackIcon invertColor" width="60" height="30" style="width:100%; height:100%;" src="../Icons/ForwardIcon.svg" alt="Seek Backwards"/>
								</div>
								<div tabindex="0" class="cell clickableButton tableBorder" title="Play/Pause (Space | K)" style="width: 100%;">
									<div id="playButton" class="invertColor"></div>
								</div>
								<div id="skipForward" tabindex="0" class="cell clickableButton tableBorder" title="Frame Skip Forward (Shift + RightArrow)" style="width: 100%;">
									<img class="playBackIcon invertColor" width="60" height="30" style="width:100%; height:100%; transform: scaleX(-1);" src="../Icons/ForwardIcon.svg" alt="Seek Forwards"/>
								</div>
								<div id="seekForward" tabindex="0" class="cell clickableButton tableBorder" title="Skip Forward (RightArrow)" style="width: 100%; text-align: center;">
									<img class="playBackIcon invertColor" width="30" height="30" style="width:50%; height:100%; transform: scaleX(-1); object-fit: contain;" src="../Icons/FastForwardIcon.svg" alt="Next Song"/>
								</div>
							</div>
						</div>
						<div class="spacer"></div>
						<div class="cell tableBorder" style="height:100%; max-width: 100cqh;">
							<img class="invertColor" style="width: 100%; height: 100%; pointer-events: none; visibility: hidden;" src="../Icons/arrows-angle-expand.svg" alt="Fullscreen"/>
						</div>
						<div id="fullscreenButton" tabindex="0" class="cell clickableButton tableBorder" title="Fullscreen (F)" style="height:100%; max-width: 100cqh;">
							<img class="invertColor" style="width: 100%; height: 100%; pointer-events: none;" src="../Icons/arrows-angle-expand.svg" alt="Fullscreen"/>
						</div>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
